<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>University Application</title>

<style>
    body {
        font-family: "Inter", Arial, sans-serif;
        margin: 0;
        padding: 0;
        background: #faf7f2;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        min-height: 100vh;
    }

    form {
        width: 90%;
        max-width: 650px;
        background: #ffffff;
        padding: 40px;
        margin-top: 40px;
        border-radius: 16px;
        box-shadow: 0 8px 25px rgba(0,0,0,0.08);
        position: relative;
        overflow: hidden;
    }

    h1 {
        text-align: center;
        margin-bottom: 25px;
        color: #3a3a3a;
        font-weight: 600;
    }

    /* Progress Bar */
    .progress-container {
        width: 100%;
        background: #eee2d3;
        height: 10px;
        border-radius: 20px;
        margin-bottom: 25px;
        overflow: hidden;
    }

    .progress-bar {
        height: 100%;
        width: 33%;
        background: #b57a4a;
        transition: width 0.5s ease;
    }

    .field {
        margin-bottom: 20px;
    }

    label {
        display: block;
        margin-bottom: 6px;
        font-weight: 600;
        color: #444;
    }

    input, select, textarea {
        width: 100%;
        padding: 12px;
        font-size: 15px;
        border: 1px solid #ddd;
        border-radius: 10px;
        background: #fdfcfb;
        transition: all 0.2s ease;
    }

    input:focus, select:focus, textarea:focus {
        border-color: #c49a6c;
        box-shadow: 0 0 0 3px rgba(196,154,108,0.2);
        outline: none;
    }

    textarea {
        resize: vertical;
    }

    .radio-group,
    .checkbox-group {
        display: flex;
        gap: 20px;
        margin-top: 8px;
    }

    button {
        width: 100%;
        padding: 14px;
        font-size: 17px;
        background: #b57a4a;
        color: white;
        border: none;
        border-radius: 12px;
        cursor: pointer;
        transition: background 0.2s ease;
        margin-top: 10px;
    }

    button:hover {
        background: #9c683e;
    }

    /* Fade Animation */
    .fade {
        opacity: 0;
        transition: opacity 0.5s ease;
    }

    .visible {
        opacity: 1;
    }

    #page2, #page3 {
        display: none;
    }
</style>

</head>

<body>

<form id="application-form">
    <h1>University Application</h1>

    <!-- Progress Bar -->
    <div class="progress-container">
        <div class="progress-bar" id="progressBar"></div>
    </div>

    <!-- PAGE 1: LOGIN -->
    <div id="page1" class="visible">

        <div class="field">
            <label for="loginEmail">Email</label>
            <input type="email" id="loginEmail" name="loginEmail">
        </div>

        <div class="field">
            <label for="loginPassword">Password</label>
            <input type="password" id="loginPassword" name="loginPassword">
        </div>

        <button type="button" onclick="goToPage2()">Login</button>
    </div>

    <!-- PAGE 2: PERSONAL DETAILS -->
    <div id="page2" class="fade">

        <div class="field">
            <label for="firstName">First Name</label>
            <input type="text" id="firstName" name="firstName">
        </div>

        <div class="field">
            <label for="lastName">Last Name</label>
            <input type="text" id="lastName" name="lastName">
        </div>

        <div class="field">
            <label for="email">Contact Email</label>
            <input type="email" id="email" name="email">
        </div>

        <div class="field">
            <label for="phoneNumber">Phone Number</label>
            <input type="tel" id="phoneNumber" name="phoneNumber">
        </div>

        <div class="field">
            <label for="address">Street Address</label>
            <input type="text" id="address" name="address">
        </div>

        <div class="field">
            <label for="city">City</label>
            <input type="text" id="city" name="city">
        </div>

        <div class="field">
            <label for="state">State / Province</label>
            <input type="text" id="state" name="state">
        </div>

        <div class="field">
            <label for="residenceCountry">Country of Current Residence</label>
            <select id="residenceCountry" name="residenceCountry">
                <option value="">Select Country</option>
                <option>United States</option>
                <option>Canada</option>
                <option>United Kingdom</option>
                <option>Australia</option>
                <option>Germany</option>
            </select>
        </div>

        <div class="field">
            <label for="citizenshipCountry">Country of Citizenship</label>
            <select id="citizenshipCountry" name="citizenshipCountry">
                <option value="">Select Country</option>
                <option>United States</option>
                <option>Canada</option>
                <option>United Kingdom</option>
                <option>Australia</option>
                <option>Germany</option>
            </select>
        </div>

        <button type="button" onclick="goBackToPage1()">Back</button>
        <button type="button" onclick="goToPage3()">Next</button>
    </div>

    <!-- PAGE 3: ACADEMIC DETAILS -->
    <div id="page3" class="fade">

        <div class="field">
            <label>Preferred Program</label>
            <div class="radio-group">
                <label><input type="radio" name="program" value="engineering"> Engineering</label>
                <label><input type="radio" name="program" value="business"> Business</label>
                <label><input type="radio" name="program" value="science"> Science</label>
            </div>
        </div>

        <div class="field">
            <label>Extracurricular Interests</label>
            <div class="checkbox-group">
                <label><input type="checkbox" name="interestSports"> Sports</label>
                <label><input type="checkbox" name="interestMusic"> Music</label>
                <label><input type="checkbox" name="interestRobotics"> Robotics</label>
            </div>
        </div>

        <div class="field">
            <label for="resumeUpload">Upload Resume</label>
            <input type="file" id="resumeUpload" name="resumeUpload">
        </div>

        <div class="field">
            <label for="transcriptUpload">Upload Transcript</label>
            <input type="file" id="transcriptUpload" name="transcriptUpload">
        </div>

        <div class="field">
            <label for="essayResponse">What is an experience in the past that you have had that has challenged you?</label>
            <textarea
                id="essayResponse"
                name="essayResponse"
                rows="6"
                maxlength="4000"
                placeholder="Write your response here... (600 word limit)"
                oninput="updateWordCount()"
            ></textarea>
            <small id="wordCount" style="color:#555;">0 / 600 words</small>
        </div>

        <div class="field">
            <label><input type="checkbox" name="agreeTerms"> I agree to the application terms and conditions</label>
        </div>

        <button type="button" onclick="goBackToPage2()">Back</button>
        <button type="submit">Submit Application</button>
    </div>

</form>

<script>
function fadeSwitch(hideId, showId, progressWidth) {
    const hide = document.getElementById(hideId);
    const show = document.getElementById(showId);
    const progress = document.getElementById("progressBar");

    hide.classList.remove("visible");
    hide.classList.add("fade");

    setTimeout(() => {
        hide.style.display = "none";
        show.style.display = "block";

        setTimeout(() => {
            show.classList.remove("fade");
            show.classList.add("visible");
        }, 50);
    }, 400);

    progress.style.width = progressWidth;
}

function goToPage2() { fadeSwitch("page1", "page2", "66%"); }
function goBackToPage1() { fadeSwitch("page2", "page1", "33%"); }
function goToPage3() { fadeSwitch("page2", "page3", "100%"); }
function goBackToPage2() { fadeSwitch("page3", "page2", "66%"); }

</script>

</body>
</html>
